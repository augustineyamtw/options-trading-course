<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options Trading Course</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface-0: #f1efe8;
      --surface-1: #f5f4f0;
      --surface-2: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --radius: 8px;
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1a1a18; --surface-1: #222220; --surface-2: #2c2c2a;
        --text-primary: #f0efe9; --text-secondary: #b4b2a9; --text-muted: #888780;
        --border: rgba(255,255,255,0.10); --border-strong: rgba(255,255,255,0.18);
      }
    }
    body { font-family: var(--font-sans); background: var(--surface-0); color: var(--text-primary); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    .container { width: 100%; max-width: 680px; }
    .site-header { text-align: center; margin-bottom: 2rem; }
    .site-header h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .site-header p { font-size: 14px; color: var(--text-muted); }
    .progress-bar { height: 6px; background: var(--surface-1); border-radius: 3px; margin-bottom: 1.5rem; border: 0.5px solid var(--border); }
    .progress-fill { height: 100%; border-radius: 3px; background: #378ADD; transition: width 0.4s; }
    .section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 8px; }
    .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .icon-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .card h3 { font-size: 15px; font-weight: 500; margin: 0 0 4px; }
    .card p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin: 0; }
    .example-box { background: var(--surface-1); border-left: 3px solid #378ADD; border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 10px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .warning-box { background: #FAEEDA; border-left: 3px solid #BA7517; border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 10px; font-size: 13px; color: #412402; line-height: 1.6; }
    .danger-box { background: #FCEBEB; border-left: 3px solid #A32D2D; border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 10px; font-size: 13px; color: #501313; line-height: 1.6; }
    .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; margin-right: 4px; margin-bottom: 4px; }
    .tag-call { background: #E1F5EE; color: #085041; }
    .tag-put { background: #FCEBEB; color: #791F1F; }
    .tag-sell { background: #FAEEDA; color: #412402; }
    .tag-danger { background: #FCEBEB; color: #791F1F; }
    .quiz-q { font-size: 15px; font-weight: 500; margin-bottom: 1rem; line-height: 1.5; }
    .quiz-opt { width: 100%; text-align: left; background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 8px; font-size: 14px; cursor: pointer; color: var(--text-primary); display: block; transition: background 0.15s; font-family: var(--font-sans); }
    .quiz-opt:hover:not(:disabled) { background: var(--surface-1); }
    .quiz-opt.reveal-correct { background: #EAF3DE; border-color: #3B6D11; color: #173404; }
    .quiz-opt.wrong { background: #FCEBEB; border-color: #A32D2D; color: #501313; }
    .feedback { font-size: 13px; padding: 10px 14px; border-radius: var(--radius); margin-top: 6px; line-height: 1.5; }
    .feedback.ok { background: #EAF3DE; color: #27500A; }
    .feedback.wrong { background: #FCEBEB; color: #791F1F; }
    .btn-nav { font-size: 14px; padding: 8px 20px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); cursor: pointer; background: transparent; color: var(--text-primary); font-family: var(--font-sans); }
    .btn-nav:hover { background: var(--surface-1); }
    .btn-primary { background: #378ADD; border-color: #378ADD; color: #fff; }
    .btn-primary:hover { background: #185FA5; border-color: #185FA5; color: #fff; }
    .score-circle { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #378ADD; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .score-num { font-size: 22px; font-weight: 500; line-height: 1; }
    .score-denom { font-size: 12px; color: var(--text-muted); }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
    .step-label { font-size: 12px; color: var(--text-muted); }
    .result-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--border); color: var(--text-secondary); }
    .result-row:last-child { border-bottom: none; }
    .chapter-banner { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; margin-bottom: 1rem; }
    .chapter-banner h2 { font-size: 18px; font-weight: 500; margin: 0 0 6px; }
    .chapter-banner p { font-size: 13px; color: var(--text-secondary); margin: 0; }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .compare-cell { border-radius: 8px; padding: 10px; font-size: 13px; line-height: 1.5; }
    .compare-cell strong { display: block; margin-bottom: 4px; font-size: 12px; }

    /* ── Visual / animation styles ── */
    .vis { margin-top: 12px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px; overflow: hidden; }
    .vis-label { font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

    @keyframes vFade    { from{opacity:0} to{opacity:1} }
    @keyframes vSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes vDraw    { to{stroke-dashoffset:0} }
    @keyframes vGrowY   { from{transform:scaleY(0)} to{transform:scaleY(1)} }
    @keyframes vPulse   { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes vSlideX  { from{transform:translateX(-20px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes vBounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes vFlowR   { 0%{left:0;opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{left:calc(100% - 24px);opacity:0} }
    @keyframes vRise    { from{transform:translateY(0)} to{transform:translateY(-55px)} }
    @keyframes vDrop    { from{transform:translateY(-55px)} to{transform:translateY(0)} }
    @keyframes vShake   { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }
    @keyframes vFill    { from{width:0} to{width:var(--w)} }

    .step-row { display:flex; align-items:center; justify-content:center; gap:10px; }
    .step-box { text-align:center; opacity:0; }
    .step-arrow { font-size:18px; color:var(--text-muted); opacity:0; }
    .scenario-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:2px; }
    .scenario { border-radius:8px; padding:10px 10px 8px; font-size:12px; line-height:1.5; }
    .bar-wrap { display:flex; align-items:flex-end; gap:16px; justify-content:center; height:110px; margin-top:4px; }
    .bar-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .bar { border-radius:4px 4px 0 0; transform-origin:bottom; transform:scaleY(0); }
    .bar-label { font-size:11px; color:var(--text-muted); text-align:center; }
    .bar-val { font-size:12px; font-weight:500; }

    .flow-track { position:relative; height:36px; background:var(--surface-2); border-radius:6px; border:0.5px solid var(--border); overflow:hidden; margin:8px 0; }
    .flow-dot { position:absolute; top:50%; transform:translateY(-50%); width:24px; height:24px; border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:13px; animation: vFlowR 1.8s ease-in-out infinite; }

    .price-track { position:relative; height:20px; background:var(--surface-2); border-radius:10px; border:0.5px solid var(--border); margin:10px 0; }
    .price-ball { position:absolute; top:50%; transform:translateY(-50%); width:20px; height:20px; border-radius:50%; background:#378ADD; display:flex;align-items:center;justify-content:center; font-size:9px; color:#fff; font-weight:500; transition:left 0.6s; }
    .price-zone { position:absolute; top:0; height:100%; border-radius:10px; opacity:0.25; }

    .rocket-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .rocket-emoji { font-size:28px; animation: vRise 0.9s ease-in-out infinite alternate; }
    .loss-counter { font-size:18px; font-weight:500; color:#A32D2D; font-variant-numeric:tabular-nums; }

    .floor-demo { display:flex; gap:16px; justify-content:center; align-items:flex-end; margin-top:4px; }
    .floor-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .floor-arrow { font-size:28px; }
    .floor-label { font-size:11px; color:var(--text-muted); text-align:center; }
    .floor-line { width:60px; height:3px; border-radius:2px; }

    .contract-card { border:1.5px solid var(--border-strong); border-radius:10px; overflow:hidden; font-size:12px; }
    .contract-row { display:flex; border-bottom:0.5px solid var(--border); }
    .contract-row:last-child { border-bottom:none; }
    .contract-key { background:var(--surface-1); padding:8px 10px; font-weight:500; min-width:110px; color:var(--text-secondary); }
    .contract-val { padding:8px 10px; color:var(--text-primary); }
    .contract-row.hl .contract-key { background:#E6F1FB; color:#0C447C; }
    .contract-row.hl .contract-val { background:#EDF5FC; color:#0C447C; font-weight:500; }
  </style>
</head>
<body>
  <div class="container">
    <div class="site-header">
      <h1>Options Trading Course</h1>
      <p>Beginner to advanced — even a 10-year-old can follow along</p>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div id="app"></div>
  </div>

<script>
/* ── Lesson data ── */
const L1 = [
  { title:"What is an option?", icon:"🎟️", iconBg:"#E6F1FB",
    body:"An option is a special ticket giving you the RIGHT — but not the obligation — to buy or sell something at a set price before a deadline.",
    example:"Imagine a toy costs $20 but you only have $5. The store lets you pay $1 to 'hold' it at $20 for two weeks. That's an option! You decide later whether to buy." },
  { title:"Call options — the right to BUY", icon:"📈", iconBg:"#E1F5EE", tags:[{label:"CALL",cls:"tag-call"}],
    body:"A CALL option lets you buy shares at a locked-in price (the strike price). You buy a call when you think the price will go UP.",
    example:"Apple is $150 today. You buy a call at $150 strike. If Apple jumps to $180, you can still buy at $150 and pocket a $30/share profit. If it drops, you only lose the premium." },
  { title:"Put options — the right to SELL", icon:"📉", iconBg:"#FCEBEB", tags:[{label:"PUT",cls:"tag-put"}],
    body:"A PUT option lets you sell shares at a locked-in price. You buy a put when you think the price will go DOWN — it's like insurance for your stocks!",
    example:"You own Apple at $150 and fear a crash. You buy a put at $150. If Apple falls to $100, you can still sell at $150 — saving $50/share!" },
  { title:"Key words to know", icon:"📖", iconBg:"#FAEEDA",
    body:"Four magic words every options trader needs:",
    bullets:[
      {icon:"🎯",term:"Strike price",def:"The locked-in buy/sell price"},
      {icon:"⏰",term:"Expiry date",def:"The deadline — after this the option is gone"},
      {icon:"💵",term:"Premium",def:"The price you pay for the option ticket"},
      {icon:"📊",term:"Underlying",def:"The stock the option is based on (e.g. Apple, Tesla)"},
    ] },
  { title:"In the money vs. out of the money", icon:"💡", iconBg:"#E1F5EE",
    body:"These phrases tell you if your option is currently profitable or not.",
    bullets:[
      {icon:"✅",term:"In the money (ITM)",def:"Has real value now. Call: stock > strike. Put: stock < strike."},
      {icon:"❌",term:"Out of the money (OTM)",def:"No value right now — you'd lose money exercising it."},
      {icon:"➡️",term:"At the money (ATM)",def:"Stock price equals the strike price exactly."},
    ] },
  { title:"The most you can lose (as a buyer)", icon:"🛡️", iconBg:"#FAEEDA",
    body:"When you BUY an option, your maximum loss is only the premium you paid — never more! That's a key safety feature of buying options.",
    example:"You pay $200 for an option. The stock crashes to zero. You lose exactly $200 — that's it! But if you owned 100 shares at $150, a crash could cost you $15,000." }
];

const L2 = [
  { title:"Selling options — flipping sides", icon:"🔄", iconBg:"#E6F1FB",
    body:"So far you've been the BUYER. But someone has to sell them! When you SELL an option, you collect the premium upfront — but you take on an obligation instead of a right.",
    bullets:[
      {icon:"💰",term:"Buyer",def:"Pays the premium. Has the RIGHT. Limited loss."},
      {icon:"🏦",term:"Seller (writer)",def:"Collects the premium. Has the OBLIGATION. Potentially unlimited loss."},
    ],
    example:"Think of it like an insurance company. You pay them a premium. If disaster strikes, THEY must pay you. The seller collects money upfront but must pay if things go wrong." },
  { title:"Selling a CALL — 'covered call'", icon:"📤", iconBg:"#E1F5EE", tags:[{label:"SELL CALL",cls:"tag-sell"}],
    body:"When you SELL a call, you promise to sell 100 shares at the strike price if the buyer exercises. You collect the premium immediately.",
    bullets:[
      {icon:"🟢",term:"You profit when",def:"The stock stays BELOW strike. The buyer won't exercise — you keep the premium."},
      {icon:"🔴",term:"You lose when",def:"The stock rises ABOVE strike. You must sell at the lower price, missing the upside."},
    ],
    example:"You own Apple at $150. You sell a call at $160 for $5 premium. Apple stays at $155 → keep $5. Apple rockets to $200 → must sell at $160, losing the $40 upside." },
  { title:"Selling a PUT — 'cash-secured put'", icon:"📥", iconBg:"#FAEEDA", tags:[{label:"SELL PUT",cls:"tag-sell"}],
    body:"When you SELL a put, you promise to BUY 100 shares at the strike price if the buyer exercises. You collect the premium upfront.",
    bullets:[
      {icon:"🟢",term:"You profit when",def:"The stock stays ABOVE strike. The put expires worthless — you keep the premium."},
      {icon:"🔴",term:"You lose when",def:"The stock falls BELOW strike. You must buy shares at the higher strike price."},
    ],
    example:"Tesla is at $200. You sell a put at $190 for $4 premium. Tesla stays above $190 → pocket $4. Tesla crashes to $150 → forced to buy at $190. Loss = $40/share minus the $4." },
  { title:"Naked calls — the most dangerous trade", icon:"⚠️", iconBg:"#FCEBEB", tags:[{label:"NAKED CALL",cls:"tag-danger"}],
    body:"A NAKED call means you sell a call WITHOUT owning the underlying shares. If the stock rockets up, your losses are theoretically UNLIMITED.",
    bullets:[
      {icon:"🔥",term:"Why it's dangerous",def:"Sold a call at $150 and the stock hits $500? You must buy at $500 and sell at $150 — a $350/share loss with NO ceiling!"},
      {icon:"🚫",term:"Who can do this",def:"Most brokers require Level 4-5 account approval and large cash reserves."},
    ],
    danger:"A naked call seller in 2021 sold calls on GameStop at $20. GameStop squeezed to $400. Loss = $380/share × 100 shares = $38,000 per contract. Losses have NO limit." },
  { title:"Naked puts — large but capped risk", icon:"⚡", iconBg:"#FAEEDA", tags:[{label:"NAKED PUT",cls:"tag-danger"}],
    body:"A NAKED put means you sell a put WITHOUT having the cash ready to buy the shares. The risk is large but LIMITED — a stock can only fall to zero.",
    bullets:[
      {icon:"⚠️",term:"Maximum loss",def:"Strike × 100 shares minus premium. E.g. $150 strike × 100 = $15,000 max if stock hits zero."},
      {icon:"📊",term:"vs. Cash-secured put",def:"Cash-secured means you actually have $15,000 ready. Naked means you're borrowing on margin."},
    ],
    warning:"Naked puts are less dangerous than naked calls (stocks can't go below zero), but still very risky. A company going bankrupt could wipe out your entire account." },
  { title:"Buyer vs. seller — quick comparison", icon:"⚖️", iconBg:"#E6F1FB",
    body:"Here's the full picture of all four positions:",
    compare:[
      {label:"Buy Call",bg:"#E1F5EE",col:"#085041",profit:"Stock goes UP",loss:"Only premium paid",risk:"Low"},
      {label:"Buy Put",bg:"#FCEBEB",col:"#791F1F",profit:"Stock goes DOWN",loss:"Only premium paid",risk:"Low"},
      {label:"Sell Call",bg:"#FAEEDA",col:"#412402",profit:"Stock stays flat/down",loss:"Unlimited (if naked)",risk:"Very High (naked)"},
      {label:"Sell Put",bg:"#F4C0D1",col:"#4B1528",profit:"Stock stays flat/up",loss:"Strike × 100 (if naked)",risk:"High (naked)"},
    ] }
];

/* ── Visuals ── */
function getVis(phase, idx) {
  const key = `${phase}-${idx}`;

  if (key === '1-0') return `
    <div class="vis">
      <div class="vis-label">How it works — toy store example</div>
      <div class="step-row">
        <div class="step-box" style="animation:vSlideUp 0.5s 0.1s ease forwards;">
          <div style="font-size:32px;animation:vBounce 1s 0.6s ease infinite;">🧸</div>
          <div style="background:#E6F1FB;border-radius:6px;padding:4px 10px;margin-top:6px;font-size:13px;font-weight:500;color:#0C447C;">$20 price</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">real price tag</div>
        </div>
        <div class="step-arrow" style="animation:vFade 0.4s 0.7s ease forwards;">→</div>
        <div class="step-box" style="animation:vSlideUp 0.5s 0.8s ease forwards;">
          <div style="font-size:32px;">🎟️</div>
          <div style="background:#EAF3DE;border-radius:6px;padding:4px 10px;margin-top:6px;font-size:13px;font-weight:500;color:#27500A;">Pay $1 now</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">hold ticket (premium)</div>
        </div>
        <div class="step-arrow" style="animation:vFade 0.4s 1.4s ease forwards;">→</div>
        <div class="step-box" style="animation:vSlideUp 0.5s 1.5s ease forwards;">
          <div style="display:flex;gap:5px;justify-content:center;">
            <div style="background:#EAF3DE;border-radius:6px;padding:6px 8px;font-size:13px;animation:vPulse 1.5s 2s ease infinite;">✅ Buy</div>
            <div style="background:#FCEBEB;border-radius:6px;padding:6px 8px;font-size:13px;">❌ Skip</div>
          </div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:6px;">YOUR choice!</div>
        </div>
      </div>
    </div>`;

  if (key === '1-1') return `
    <div class="vis">
      <div class="vis-label">Call option — stock price goes up, you profit</div>
      <svg viewBox="0 0 260 100" style="width:100%;height:100px;" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gUp" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="0" y1="62" x2="260" y2="62" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="5,4"/>
        <text x="4" y="59" font-size="9" fill="#378ADD" font-family="system-ui" style="animation:vFade 0.4s 0.3s forwards;opacity:0;">Strike $150</text>
        <path d="M10,86 L50,80 L90,72 L120,62 L150,48 L180,32 L210,18 L245,8"
          stroke="#1D9E75" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="350" stroke-dashoffset="350"
          style="animation:vDraw 1.4s 0.3s ease forwards;"/>
        <path d="M120,62 L150,48 L180,32 L210,18 L245,8 L245,62 Z"
          fill="url(#gUp)" style="animation:vFade 0.6s 1.7s ease forwards;opacity:0;"/>
        <text x="160" y="42" font-size="9" fill="#1D9E75" font-weight="bold" font-family="system-ui" style="animation:vSlideUp 0.5s 2s ease forwards;opacity:0;">+$30 profit zone 🎉</text>
        <circle cx="245" cy="8" r="4" fill="#1D9E75" style="animation:vFade 0.3s 1.7s forwards;opacity:0;"/>
        <text x="232" y="6" font-size="8" fill="#1D9E75" font-family="system-ui" style="animation:vFade 0.3s 2s forwards;opacity:0;">$180</text>
        <text x="113" y="76" font-size="8" fill="#378ADD" font-family="system-ui" style="animation:vFade 0.3s 2.2s forwards;opacity:0;">buy at $150</text>
      </svg>
      <div style="display:flex;gap:14px;font-size:11px;color:var(--text-muted);padding-top:4px;">
        <span style="display:flex;align-items:center;gap:4px;"><svg width="16" height="4"><line x1="0" y1="2" x2="16" y2="2" stroke="#1D9E75" stroke-width="2.5"/></svg>stock price</span>
        <span style="display:flex;align-items:center;gap:4px;"><svg width="16" height="4"><line x1="0" y1="2" x2="16" y2="2" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4,3"/></svg>strike price</span>
        <span style="display:flex;align-items:center;gap:4px;"><div style="width:14px;height:8px;background:rgba(29,158,117,0.2);border-radius:2px;"></div>profit zone</span>
      </div>
    </div>`;

  if (key === '1-2') return `
    <div class="vis">
      <div class="vis-label">Put option — stock falls, your put protects you</div>
      <svg viewBox="0 0 260 100" style="width:100%;height:100px;" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gDn" x1="0" y1="1" x2="0" y2="0">

        <div style="font-size:36px;margin-bottom:8px;">🎓</div>
        <h2>Chapter 2: Advanced Options</h2>
        <p style="margin-bottom:0.75rem;">You've mastered buying options. Now learn the other side — selling options, covered calls, naked calls, and more.</p>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem;">6 advanced lessons + 7 quiz questions</p>
        <button class="btn-nav btn-primary" onclick="startChapter2()">Start advanced lessons</button>
      </div>`;
    return;
  }

  if(mode==="lesson"){
    const l = lessons[lIdx];
    const baseSteps = phase===1 ? 0 : (L1.length+QUIZ_SIZE);
    setProgress(((baseSteps+lIdx)/totalSteps)*100);

    let inner="";
    if(l.bullets){
      inner = l.bullets.map(b=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);align-items:flex-start;">
        <span style="font-size:15px;margin-top:1px;">${b.icon}</span>
        <div><span style="font-size:13px;font-weight:500;color:var(--text-primary);">${b.term}</span><span style="font-size:13px;color:var(--text-secondary);"> — ${b.def}</span></div>
      </div>`).join("");
      inner = `<div style="margin-top:10px;">${inner}</div>`;
    }
    if(l.compare){
      inner = `<div class="compare-grid">${l.compare.map(c=>`<div class="compare-cell" style="background:${c.bg};">
        <strong style="color:${c.col};font-size:12px;">${c.label}</strong>
        <div style="font-size:12px;color:${c.col};margin-bottom:2px;">Profit: ${c.profit}</div>
        <div style="font-size:12px;color:${c.col};margin-bottom:2px;">Max loss: ${c.loss}</div>
        <div style="font-size:11px;font-weight:500;color:${c.col};">Risk: ${c.risk}</div>
      </div>`).join("")}</div>`;
    }

    const visHtml  = getVis(phase, lIdx);
    const exHtml   = l.example ? `<div class="example-box"><strong style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#185FA5;">Example</strong><br>${l.example}</div>` : "";
    const warnHtml = l.warning  ? `<div class="warning-box"><strong style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;">Warning</strong><br>${l.warning}</div>` : "";
    const dangHtml = l.danger   ? `<div class="danger-box"><strong style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;">Real-world example</strong><br>${l.danger}</div>` : "";
    const tagsHtml = (l.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join("");
    const chLabel  = phase===1 ? "Chapter 1" : "Chapter 2";

    app.innerHTML=`
      <p class="section-title">${chLabel} · Lesson ${lIdx+1} of ${lessons.length}</p>
      <div class="card">
        <div class="card-header">
          <div class="icon-circle" style="background:${l.iconBg}">${l.icon}</div>
          <div><h3>${l.title}</h3>${tagsHtml?`<div>${tagsHtml}</div>`:""}</div>
        </div>
        <p>${l.body}</p>
        ${inner}${visHtml}${exHtml}${warnHtml}${dangHtml}
      </div>
      <div class="nav-row">
        <button class="btn-nav" onclick="prevL()" ${lIdx===0?"style='visibility:hidden'":""}>← Back</button>
        <span class="step-label">${lIdx+1} / ${lessons.length}</span>
        <button class="btn-nav btn-primary" onclick="nextL()">${lIdx===lessons.length-1?"Start quiz →":"Next →"}</button>
      </div>`;

    afterRender(phase, lIdx);
    return;
  }

  if(mode==="quiz"){
    const q = quiz[qIdx];
    const baseSteps = phase===1 ? L1.length : (L1.length+QUIZ_SIZE+L2.length);
    setProgress(((baseSteps+qIdx)/totalSteps)*100);
    const correct = scores.filter(Boolean).length;
    const optsHtml = q.opts.map((o,i)=>{
      let cls="quiz-opt";
      if(answered){ if(i===q.ans) cls+=" reveal-correct"; else if(i===sel) cls+=" wrong"; }
      return `<button class="${cls}" onclick="pick(${i})" ${answered?"disabled":""}>${o}</button>`;
    }).join("");
    const feedHtml = answered ? `<div class="feedback ${sel===q.ans?"ok":"wrong"}">${sel===q.ans?"✅ Correct! ":"❌ Not quite. "}${q.explain}</div>` : "";
    const chLabel = phase===1 ? "Chapter 1" : "Chapter 2";
    app.innerHTML=`
      <p class="section-title">${chLabel} quiz · Question ${qIdx+1} of ${quiz.length} &nbsp;·&nbsp; ${correct} correct so far</p>
      <div class="card">
        <div class="quiz-q">${q.q}</div>
        ${optsHtml}${feedHtml}
      </div>
      <div class="nav-row"><span></span>${answered?`<button class="btn-nav btn-primary" onclick="nextQ()">${qIdx===quiz.length-1?"See results →":"Next question"}</button>`:""}</div>`;
    return;
  }

  if(mode==="result"){
    const correct = scores.filter(Boolean).length;
    const total   = quiz.length;
    const pct     = Math.round((correct/total)*100);
    const perfect  = scores.every(Boolean);
    const emoji    = perfect?"🏆":pct>=60?"🎉":"📚";
    const msg      = perfect?"Perfect score! You've mastered this chapter.":pct>=60?"Good work! Review any wrong answers before moving on.":"Keep at it — re-read the lessons and try again.";
    const chLessons = phase===1 ? L1 : L2;
    const rows     = quiz.map((q,i)=>`
      <div class="result-row" style="cursor:pointer;" onclick="goToLesson(${i})" title="Review lesson ${i+1}">
        <span style="display:flex;align-items:center;gap:6px;flex:1;margin-right:8px;">
          <span style="font-size:16px;">${chLessons[i]?chLessons[i].icon:""}</span>
          <span>${q.q.slice(0,50)}…</span>
        </span>
        <span style="display:flex;align-items:center;gap:6px;">
          <span>${scores[i]?"✅":"❌"}</span>
          <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">${scores[i]?"":"← recap"}</span>
        </span>
      </div>`).join("");

    const advBtn = phase===1
      ? (perfect
          ? `<button class="btn-nav btn-primary" style="flex:1;" onclick="goAdv()">Continue to advanced lessons →</button>`
          : `<div style="flex:2;background:#FAEEDA;border-radius:var(--radius);padding:10px 12px;font-size:12px;color:#412402;display:flex;align-items:center;gap:8px;">
               <span style="font-size:16px;">🔒</span>
               <span><strong>Perfect score required</strong> to unlock advanced lessons. Review the lessons marked ← recap, then retry with new questions.</span>
             </div>`)
      : `<button class="btn-nav btn-primary" style="flex:1;" onclick="goCh2Quiz()">Retry with new questions</button>`;

    app.innerHTML=`
      <div style="text-align:center;padding:1rem 0 0.5rem;">
        <div style="font-size:32px;margin-bottom:8px;">${emoji}</div>
        <div class="score-circle" style="border-color:${perfect?"#1D9E75":"#378ADD"};">
          <span class="score-num">${correct}/${total}</span>
          <span class="score-denom">${pct}%</span>
        </div>
        <p style="font-size:14px;color:var(--text-secondary);margin:0 0 1.5rem;">${msg}</p>
      </div>
      <div class="card">
        <p class="section-title" style="margin-bottom:2px;">Your answers</p>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Tap any row to go back and review that lesson</p>
        ${rows}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem;">
        <button class="btn-nav" style="flex:1;min-width:120px;" onclick="retryQ()">Retry with new questions</button>
        <button class="btn-nav" style="flex:1;min-width:120px;" onclick="goToLesson(0)">← Review all lessons</button>
        ${advBtn}
      </div>`;
  }
}

/* ── Post-render hooks (animations that need JS) ── */
function afterRender(phase, idx) {
  if (phase===1 && idx===4) {
    /* ITM/OTM/ATM ball animation */
    const ball = document.getElementById("pball");
    const lbl  = document.getElementById("itmLabel");
    if (!ball) return;
    const positions = [
      {left:"12%", label:"Out of the money (OTM) — call not worth exercising"},
      {left:"50%", label:"At the money (ATM) — right at the strike price"},
      {left:"82%", label:"In the money (ITM) — call has real profit now! 🎉"},
    ];
    let i = 0;
    setTimeout(()=>{
      function step(){
        const p = positions[i % positions.length];
        ball.style.left = p.left;
        if(lbl){ lbl.style.opacity="1"; lbl.textContent = p.label; }
        i++;
        if(i < positions.length * 2) setTimeout(step, 1600);
      }
      step();
    }, 500);
  }

  if (phase===2 && idx===3) {
    /* Naked call loss counter */
    const el = document.getElementById("lossCount");
    if (!el) return;
    const targets = [0, 3800, 15000, 38000];
    let t = 0;
    setTimeout(()=>{
      function tick(){
        if(t >= targets.length) return;
        const target = targets[t++];
        el.textContent = "$" + target.toLocaleString();
        el.style.fontSize = t > 2 ? "22px" : "20px";
        setTimeout(tick, t===1 ? 600 : 800);
      }
      tick();
    }, 400);
  }
}

/* ── Navigation ── */
function prevL(){ if(lIdx>0){ lIdx--; render(); } }
function nextL(){
  const lessons = phase===1 ? L1 : L2;
  if(lIdx<lessons.length-1){ lIdx++; render(); }
  else { mode="quiz"; qIdx=0; sel=null; answered=false; render(); }
}
function pick(i){
  if(answered) return;
  sel=i; answered=true;
  const quiz = phase===1 ? activeQ1 : activeQ2;
  if(phase===1) scores1[qIdx]=(i===quiz[qIdx].ans);
  else          scores2[qIdx]=(i===quiz[qIdx].ans);
  render();
}
function nextQ(){
  const quiz = phase===1 ? activeQ1 : activeQ2;
  if(qIdx<quiz.length-1){ qIdx++; sel=null; answered=false; render(); }
  else { mode="result"; render(); }
}
function retryQ(){
  if(phase===1){ scores1=[]; activeQ1=pickQ(Q1_POOL); }
  else         { scores2=[]; activeQ2=pickQ(Q2_POOL); }
  qIdx=0; sel=null; answered=false; mode="quiz"; render();
}
function goAdv()       { mode="chapter-intro"; render(); }
function startChapter2(){ phase=2; mode="lesson"; lIdx=0; sel=null; answered=false; render(); }
function goCh2Quiz()   { scores2=[]; activeQ2=pickQ(Q2_POOL); qIdx=0; sel=null; answered=false; mode="quiz"; render(); }
function goToLesson(i) { mode="lesson"; lIdx=Math.min(i, (phase===1?L1:L2).length-1); render(); }

render();
</script>

</html>
